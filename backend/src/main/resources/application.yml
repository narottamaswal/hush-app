spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000
  flyway:
    baseline-version: 0
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org:
      springframework:
        web:
          servlet:
            resource: DEBUG

server:
  servlet:
    session:
      cookie:
        same-site: lax
        path: /
        http-only: true
        name: JSESSIONID