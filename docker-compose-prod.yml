name: hushapp

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${OAUTH2_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
